<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử đặt tour - TravelTour</title>
    <link rel="stylesheet" href="../../assets/css/customer/customer.css" />
    <link rel="stylesheet" href="../../assets/css/customer/history.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- Top Navigation -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <a href="customer.html" class="logo">TravelTour</a>
        </div>

        <div class="topbar-right">
          <div class="user-info">
            <p class="user-name">Nguyễn Văn An</p>
            <p class="user-role">Khách hàng</p>
          </div>
          <img
            class="user-avatar"
            src="https://images.unsplash.com/photo-1768933294181-82778103e501?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxoYXBweSUyMGFzaWFuJTIwd29tYW4lMjB0cmF2ZWxlciUyMHBvcnRyYWl0fGVufDF8fHx8MTc3MzY3MjYxNXww&ixlib=rb-4.1.0&q=80&w=1080"
            alt="User Avatar"
          />
        </div>
      </header>

      <div class="dashboard-body">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <nav class="sidebar-menu">
            <a href="customer.html" class="menu-item">
              <span class="menu-icon">👤</span>
              <span>Thông tin cá nhân</span>
            </a>

            <a href="history.html" class="menu-item active">
              <span class="menu-icon">🕘</span>
              <span>Lịch sử đặt tour</span>
            </a>

            <a href="booking.html" class="menu-item">
              <span class="menu-icon">📅</span>
              <span>Booking của tôi</span>
            </a>

            <a href="changepass.html" class="menu-item">
              <span class="menu-icon">🔒</span>
              <span>Đổi mật khẩu</span>
            </a>

            <button class="menu-item logout-btn" type="button">
              <span class="menu-icon">🚪</span>
              <span>Đăng xuất</span>
            </button>
          </nav>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
          <div class="page-container history-page-container">
            <!-- Page Header -->
            <section class="page-header">
              <h1>Lịch sử đặt tour</h1>
              <p>Danh sách tất cả các tour bạn đã đặt</p>
            </section>

            <!-- Filter Section -->
            <section class="card filter-card">
              <div class="filter-row">
                <select id="statusFilter" class="filter-control">
                  <option value="all">Tất cả trạng thái</option>
                  <option value="Đã xác nhận">Đã xác nhận</option>
                  <option value="Chờ thanh toán">Chờ thanh toán</option>
                  <option value="Hoàn thành">Hoàn thành</option>
                  <option value="Đã hủy">Đã hủy</option>
                </select>

                <input
                  id="searchInput"
                  type="text"
                  class="filter-control search-control"
                  placeholder="Tìm kiếm tour..."
                />
              </div>
            </section>

            <!-- Booking List -->
            <section>
              <div id="historyList" class="history-list"></div>
            </section>
          </div>
        </main>
      </div>
    </div>
    <div id="cancelModal" class="cancel-modal">
      <div class="cancel-modal__overlay" data-cancel-close></div>

      <div class="cancel-modal__box">
        <h2>Hủy tour</h2>
        <p>Vui lòng chọn lý do hủy tour</p>

        <select id="cancelReason" class="cancel-modal__select">
          <option value="">-- Chọn lý do --</option>
          <option value="Thay đổi kế hoạch">Thay đổi kế hoạch</option>
          <option value="Không còn nhu cầu đi tour">
            Không còn nhu cầu đi tour
          </option>
          <option value="Thông tin tour không phù hợp">
            Thông tin tour không phù hợp
          </option>
          <option value="Muốn đổi sang tour khác">
            Muốn đổi sang tour khác
          </option>
          <option value="Lý do cá nhân">Lý do cá nhân</option>
          <option value="Khác">Khác</option>
        </select>

        <textarea
          id="cancelReasonOther"
          class="cancel-modal__textarea"
          placeholder="Nhập lý do khác..."
          style="display: none"
        ></textarea>

        <div class="cancel-modal__actions">
          <button
            type="button"
            class="cancel-modal__btn cancel-modal__btn--ghost"
            data-cancel-close
          >
            Đóng
          </button>

          <button
            type="button"
            id="confirmCancelBtn"
            class="cancel-modal__btn cancel-modal__btn--danger"
          >
            Xác nhận hủy
          </button>
        </div>
      </div>
    </div>
    <div id="confirmCancelModal" class="confirm-cancel-modal">
      <div class="modal-content">
        <h3>Bạn chắc chắn muốn hủy tour này?</h3>

        <div class="modal-actions">
          <button id="cancelConfirmCancel" class="btn-cancel">Không</button>
          <button id="confirmCancelFinal" class="btn-confirm">
            Đồng ý hủy
          </button>
        </div>
      </div>
    </div>
    <div class="modal" id="logoutModal">
      <div class="modal-content">
        <h3>Bạn có muốn đăng xuất không?</h3>

        <div class="modal-actions">
          <button class="btn-cancel" id="cancelLogout">Hủy</button>
          <button class="btn-confirm" id="confirmLogout">Đăng xuất</button>
        </div>
      </div>
    </div>
    <div id="messageModal" class="confirm-cancel-modal">
      <div class="modal-content">
        <h3>Không thể hủy tour</h3>
        <p id="messageModalText"></p>

        <div class="modal-actions">
          <button type="button" id="messageModalOk" class="btn-confirm">
            Đóng
          </button>
        </div>
      </div>
    </div>
    <script src="../../assets/js/customer/history.js"></script>
  </body>
</html>
