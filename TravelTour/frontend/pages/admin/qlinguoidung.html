<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelTour - Quản lý người dùng</title>
    <link rel="stylesheet" href="../../assets/css/admin/admin-base.css" />
    <link rel="stylesheet" href="../../assets/css/admin/qlinguoidung.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-name">TravelTour</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
        <nav id="sidebarNav" class="nav"></nav>
        <div class="sidebar-footer">© 2026 TravelTour</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Quản lý người dùng</h1>
          <div class="top-actions">
            <label class="search">
              <input
                type="search"
                placeholder="Tìm kiếm..."
                aria-label="Tìm kiếm"
              />
              <svg
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M7.333 12.667a5.333 5.333 0 1 0 0-10.667 5.333 5.333 0 0 0 0 10.667Z"
                  stroke="#99A1AF"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="m14 14-2.867-2.867"
                  stroke="#99A1AF"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </label>
            <button class="bell" type="button" aria-label="Thông báo">
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M8.556 17.5c.146.254.356.464.61.61.253.147.54.223.833.223.293 0 .58-.076.834-.223.253-.146.464-.356.61-.61"
                  stroke="#4A5565"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M2.718 12.772a.96.96 0 0 0-.147.897c.066.148.172.274.308.362.135.088.294.135.455.136h13.333c.161 0 .319-.047.455-.135a.965.965 0 0 0 .308-.362.96.96 0 0 0-.147-.898C16.175 11.63 15 10.416 15 6.667c0-1.326-.527-2.598-1.465-3.535C12.598 2.194 11.326 1.667 10 1.667s-2.598.527-3.535 1.465C5.527 4.069 5 5.341 5 6.667c0 3.75-1.176 4.964-2.282 6.105Z"
                  stroke="#4A5565"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span class="dot"></span>
            </button>
            <div class="user">
              <div class="avatar user-avatar">AD</div>
              <div class="user-info">
                <div class="name">Admin User</div>
                <div class="email">admin@traveltour.vn</div>
              </div>
            </div>
          </div>
        </header>

        <div class="header-row">
          <div class="header-sub">Quản lý tất cả người dùng trong hệ thống</div>
          <div class="actions">
            <button class="btn" type="button">
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M6.667 13.333c0 .124.034.246.099.351.065.106.158.191.27.246l1.333.667a.667.667 0 0 0 .951-.6V9.333c0-.33.123-.649.345-.894l4.815-5.326a.417.417 0 0 0-.045-.596.416.416 0 0 0-.271-.1H2c-.17 0-.334.068-.455.19a.417.417 0 0 0-.09.458L7.27 8.439c.222.245.345.564.345.894v3.999Z"
                  stroke="#0A0A0A"
                  stroke-width="1.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              Lọc
            </button>
            <div class="split" id="partnerSplit">
              <button class="btn primary split-main" type="button" id="btnPartnerMenu">
                 Tạo đối tác
              </button>
              <button class="btn primary split-caret" type="button" id="btnPartnerCaret" aria-label="Chọn loại đối tác">
                ▼
              </button>
              <div class="split-menu" id="partnerMenu" role="menu" aria-hidden="true">
                <button type="button" class="split-item" data-role="provider" role="menuitem">Provider</button>
                <button type="button" class="split-item" data-role="guide" role="menuitem">Guide</button>
              </div>
            </div>
            <button class="btn primary" type="button">
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M14 10v2.667c0 .353-.14.692-.39.942a1.333 1.333 0 0 1-.943.391H3.333a1.333 1.333 0 0 1-.942-.39 1.333 1.333 0 0 1-.391-.943V10"
                  stroke="white"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="m4.667 6.667 3.333 3.333 3.333-3.333"
                  stroke="white"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M8 10V2"
                  stroke="white"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              Xuất Excel
            </button>
          </div>
        </div>

        <section class="stats-grid" id="statsGrid"></section>

        <section class="panel">
          <div class="table-wrap">
            <table class="table" id="userTable">
              <thead>
                <tr>
                  <th>Tên người dùng</th>
                  <th>Email</th>
                  <th>Vai trò</th>
                  <th>Trạng thái</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="table-footer">
            <div id="pagingText">Hiển thị 1-8 trong 12,458 người dùng</div>
            <div class="pagination" id="pagination"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="../../assets/js/admin/qlinguoidung.js"></script>
    <script src="../../assets/js/admin/thongbao.js"></script>
    <div class="modal" id="partnerModal" aria-hidden="true">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="partnerModalTitle">
        <div class="modal-head">
          <div>
            <div class="modal-title" id="partnerModalTitle">Tạo tài khoản đối tác</div>
            <div class="modal-sub" id="partnerModalSub">Tạo tài khoản Provider/Guide để hợp tác</div>
          </div>
          <button type="button" class="icon-btn modal-close" data-close="1" aria-label="Đóng">✕</button>
        </div>
        <form id="partnerForm" class="modal-body">
          <input type="hidden" id="partnerRole" value="provider" />
          <div class="field">
            <label>Loại đối tác</label>
            <div class="pill-row">
              <span class="pill partner" id="partnerRolePill">Provider</span>
            </div>
          </div>
          <div class="field">
            <label for="partnerName">Họ tên</label>
            <input id="partnerName" type="text" placeholder="Ví dụ: Nguyễn Văn A" required />
          </div>
          <div class="field">
            <label for="partnerEmail">Email / Tên đăng nhập</label>
            <input id="partnerEmail" type="text" placeholder="Ví dụ: provider@email.com" required />
          </div>
          <div class="field">
            <label for="partnerPass">Mật khẩu</label>
            <input id="partnerPass" type="text" placeholder="Ví dụ: 123456" required />
          </div>
          <div class="modal-actions">
            <button type="button" class="btn" data-close="1">Hủy</button>
            <button type="submit" class="btn primary" id="partnerSubmit">Tạo tài khoản</button>
          </div>
        </form>
      </div>
    </div>
    <!-- Inline JS đã được tách sang ../../assets/js/admin/qlinguoidung.js -->
  </body>
</html>
