<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelTour - Admin Tổng quan</title>
    <link rel="stylesheet" href="../../assets/css/admin/admin-base.css" />
    <link rel="stylesheet" href="../../assets/css/admin/tongquan.css" />
  </head>
  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-name">TravelTour</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
        <nav id="sidebarNav" class="nav"></nav>
        <div class="sidebar-footer">© 2026 TravelTour</div>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Tổng quan</h1>
          <div class="top-actions">
            <label class="search">
              <input
                type="search"
                placeholder="Tìm kiếm..."
                aria-label="Tìm kiếm"
              />
              <svg
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M7.333 12.667a5.333 5.333 0 1 0 0-10.667 5.333 5.333 0 0 0 0 10.667Z"
                  stroke="#99A1AF"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="m14 14-2.867-2.867"
                  stroke="#99A1AF"
                  stroke-width="1.3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </label>
            <button class="bell" type="button" aria-label="Thông báo">
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M8.556 17.5c.146.254.356.464.61.61.253.147.54.223.833.223.293 0 .58-.076.834-.223.253-.146.464-.356.61-.61"
                  stroke="#4A5565"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M2.718 12.772a.96.96 0 0 0-.147.897c.066.148.172.274.308.362.135.088.294.135.455.136h13.333c.161 0 .319-.047.455-.135a.965.965 0 0 0 .308-.362.96.96 0 0 0-.147-.898C16.175 11.63 15 10.416 15 6.667c0-1.326-.527-2.598-1.465-3.535C12.598 2.194 11.326 1.667 10 1.667s-2.598.527-3.535 1.465C5.527 4.069 5 5.341 5 6.667c0 3.75-1.176 4.964-2.282 6.105Z"
                  stroke="#4A5565"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span class="dot"></span>
            </button>
            <div class="user">
              <div class="avatar user-avatar">AD</div>
              <div class="user-info">
                <div class="name">Admin User</div>
                <div class="email">admin@traveltour.vn</div>
              </div>
            </div>
          </div>
        </header>

        <section class="stats-grid" id="statsGrid"></section>

        <div class="panels">
          <section class="panel" aria-labelledby="booking-heading">
            <div class="panel-header">
              <h2 id="booking-heading">Booking gần đây</h2>
              <a href="#" class="link">Xem tất cả</a>
            </div>
            <div class="list" id="bookingList"></div>
          </section>

          <section class="panel" aria-labelledby="popular-heading">
            <div class="panel-header">
              <h2 id="popular-heading">Tour phổ biến</h2>
              <svg
                width="20"
                height="20"
                viewBox="0 0 20 20"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M18.333 5.833 11.25 12.917 7.083 8.75 1.667 14.167"
                  stroke="#00A63E"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M13.333 5.833H18.333V10.833"
                  stroke="#00A63E"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </div>
            <div class="list" id="popularTours"></div>
          </section>
        </div>

        <section class="highlight-grid" id="highlightGrid"></section>
      </main>
    </div>

    <script src="../../assets/js/admin/tongquan.js"></script>
    <script src="../../assets/js/admin/thongbao.js"></script>
  </body>
</html>
