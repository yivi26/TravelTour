<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - TravelTour</title>
    <link rel="stylesheet" href="../assets/css/register.css" />
  </head>
  <body>
    <div class="register-page">
      <!-- Left Side -->
      <div class="register-left">
        <div class="register-left-overlay"></div>
        <div class="register-left-content">
          <h1>TravelTour</h1>
          <p class="left-subtitle">Khám phá thế giới cùng TravelTour</p>
          <p class="left-description">
            Đặt tour dễ dàng, khám phá những điểm đến tuyệt đẹp.
          </p>
        </div>
      </div>

      <!-- Right Side -->
      <div class="register-right">
        <div class="register-wrapper">
          <!-- Mobile logo -->
          <div class="mobile-logo">
            <h1>TravelTour</h1>
            <p>Khám phá thế giới cùng chúng tôi</p>
          </div>

          <div class="register-card">
            <div class="register-heading">
              <h2>Đăng ký</h2>
              <p>Tạo tài khoản để bắt đầu hành trình của bạn</p>
            </div>

            <form id="registerForm" class="register-form">
              <!-- Họ và tên -->
              <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <div class="input-wrap">
                  <span class="input-icon">👤</span>
                  <input
                    id="fullname"
                    name="fullname"
                    type="text"
                    placeholder="Nguyễn Văn A"
                  />
                </div>
              </div>

              <!-- Email -->
              <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                  <span class="input-icon">✉️</span>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="name@example.com"
                  />
                </div>
              </div>

              <!-- Số điện thoại -->
              <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <div class="input-wrap">
                  <span class="input-icon">📞</span>
                  <input
                    id="phone"
                    name="phone"
                    type="tel"
                    placeholder="0912 345 678"
                  />
                </div>
              </div>

              <!-- Mật khẩu -->
              <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="input-wrap password-wrap">
                  <span class="input-icon">🔒</span>
                  <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    class="toggle-password"
                    data-target="password"
                    aria-label="Hiện mật khẩu"
                  >
                    👁️
                  </button>
                </div>
              </div>

              <!-- Xác nhận mật khẩu -->
              <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="input-wrap password-wrap">
                  <span class="input-icon">🔒</span>
                  <input
                    id="confirm-password"
                    name="confirm-password"
                    type="password"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    class="toggle-password"
                    data-target="confirm-password"
                    aria-label="Hiện mật khẩu"
                  >
                    👁️
                  </button>
                </div>
              </div>

              <!-- Terms -->
              <div class="terms-group">
                <label class="terms-label">
                  <input type="checkbox" id="terms" />
                  <span>
                    Tôi đồng ý với
                    <a href="#">Điều khoản dịch vụ</a>
                    và
                    <a href="#">Chính sách bảo mật</a>
                  </span>
                </label>
              </div>

              <!-- Message -->
              <p id="formMessage" class="form-message"></p>

              <!-- Submit -->
              <button type="submit" class="btn-submit">Đăng ký</button>

              <!-- Divider -->
              <div class="divider">
                <span>Hoặc</span>
              </div>

              <!-- Google button -->
              <button type="button" class="btn-google">
                <span class="google-icon">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      fill="#4285F4"
                      d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    />
                    <path
                      fill="#34A853"
                      d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    />
                    <path
                      fill="#FBBC05"
                      d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    />
                    <path
                      fill="#EA4335"
                      d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    />
                  </svg>
                </span>
                <span>Đăng ký với Google</span>
              </button>
            </form>

            <p class="login-link">
              Đã có tài khoản?
              <a href="./login.html">Đăng nhập</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="../assets/js/register.js"></script>
  </body>
</html>
