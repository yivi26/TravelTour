<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard hướng dẫn viên - TravelTour</title>
    <link rel="stylesheet" href="../../assets/css/guide/tongquan.css" />
  </head>

  <body>
    <div class="dashboard">
      <header class="topbar">
        <div class="topbar-left">
          <a href="tongquan.html" class="logo">TravelTour</a>
        </div>

        <div class="topbar-right">
          <div class="user-info">
            <p class="user-name" id="topbarUserName">Đang tải...</p>
            <p class="user-role" id="topbarUserRole">Hướng dẫn viên</p>
          </div>

          <img
            class="user-avatar"
            id="topbarUserAvatar"
            src="https://ui-avatars.com/api/?name=User&background=16a34a&color=fff"
            alt="Guide Avatar"
          />
        </div>
      </header>

      <div class="dashboard-body">
        <aside class="sidebar">
          <nav class="sidebar-menu">
            <a href="tongquan.html" class="menu-item active">
              <span class="menu-icon">📊</span>
              <span>Dashboard</span>
            </a>

            <a href="lichtrinh.html" class="menu-item">
              <span class="menu-icon">🕘</span>
              <span>Lịch trình của tôi</span>
            </a>

            <a href="tourdangdan.html" class="menu-item">
              <span class="menu-icon">📅</span>
              <span>Tour đang dẫn</span>
            </a>

            <a href="khachhang.html" class="menu-item">
              <span class="menu-icon">👥</span>
              <span>Khách hàng</span>
            </a>

            <a href="thunhap.html" class="menu-item">
              <span class="menu-icon">💰</span>
              <span>Thu nhập</span>
            </a>

            <a href="hosocanhan.html" class="menu-item">
              <span class="menu-icon">👤</span>
              <span>Hồ sơ cá nhân</span>
            </a>

            <button class="menu-item logout-btn" type="button" id="logoutBtn">
              <span class="menu-icon">🚪</span>
              <span>Đăng xuất</span>
            </button>
          </nav>
        </aside>

        <main class="main-content">
          <div class="page-container guide-dashboard-page">
            <section class="page-header">
              <h1>Dashboard</h1>
              <p>Tổng quan hoạt động của hướng dẫn viên</p>
            </section>

            <section class="stats-grid" id="statsGrid"></section>

            <section class="card section-card">
              <h3 class="section-title">Tour sắp diễn ra</h3>
              <div class="upcoming-list" id="upcomingToursList"></div>
            </section>

            <section class="actions-grid" id="quickActionsGrid"></section>
          </div>
        </main>
      </div>
    </div>

    <script src="../../assets/js/guide/guideTopbar.js"></script>
    <script src="../../assets/js/guide/tongquan.js"></script>
  </body>
</html>
