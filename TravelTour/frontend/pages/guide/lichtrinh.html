<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch trình của tôi</title>
    <link rel="stylesheet" href="../../assets/css/guide/tongquan.css" />
    <link rel="stylesheet" href="../../assets/css/guide/lichtrinh.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- TOPBAR giữ nguyên -->
      <header class="topbar">
        <div class="topbar-left">
          <a href="tongquan.html" class="logo">TravelTour</a>
        </div>

        <div class="topbar-right">
          <div class="user-info">
            <p class="user-name">Nguyễn Văn An</p>
            <p class="user-role">Hướng dẫn viên</p>
          </div>
          <img
            class="user-avatar"
            src="https://images.unsplash.com/photo-1768933294181-82778103e501?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
          />
        </div>
      </header>

      <div class="dashboard-body">
        <!-- SIDEBAR giữ nguyên -->
        <aside class="sidebar">
          <nav class="sidebar-menu">
            <a href="tongquan.html" class="menu-item">
              <span class="menu-icon">📊</span>
              Dashboard
            </a>

            <a href="lichtrinh.html" class="menu-item active">
              <span class="menu-icon">🗓</span>
              Lịch trình của tôi
            </a>

            <a href="tourdangdan.html" class="menu-item">
              <span class="menu-icon">📍</span>
              Tour đang dẫn
            </a>

            <a href="khachhang.html" class="menu-item">
              <span class="menu-icon">👥</span>
              Khách hàng
            </a>

            <a href="thunhap.html" class="menu-item">
              <span class="menu-icon">💰</span>
              Thu nhập
            </a>

            <a href="hosocanhan.html" class="menu-item">
              <span class="menu-icon">👤</span>
              Hồ sơ cá nhân
            </a>

            <button class="menu-item logout-btn">
              <span class="menu-icon">🚪</span>
              Đăng xuất
            </button>
          </nav>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
          <div class="page-container">
            <div class="page-header">
              <h1>Lịch trình của tôi</h1>
              <p>Quản lý lịch trình tour của bạn</p>
            </div>

            <!-- Filter -->
            <div class="card filter-card">
              <div class="filter-wrapper">
                <select id="statusFilter">
                  <option value="all">Tất cả</option>
                  <option value="upcoming">Sắp diễn ra</option>
                  <option value="running">Đang diễn ra</option>
                  <option value="done">Đã xong</option>
                </select>

                <button id="filterBtn">Lọc</button>
              </div>
            </div>

            <!-- LIST -->
            <div id="scheduleList" class="schedule-list"></div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../assets/js/guide/lichtrinh.js"></script>
  </body>
</html>
