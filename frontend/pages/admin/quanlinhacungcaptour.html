<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelTour - Quản lý nhà cung cấp tour</title>
  <link rel="stylesheet" href="../../assets/admin/css/admin-base.css" />
  <link rel="stylesheet" href="../../assets/admin/css/quanlinhacungcaptour.css" />
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-name">TravelTour</div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
      <nav id="sidebarNav" class="nav"></nav>
      <div class="sidebar-footer">c 2026 TravelTour</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1>Quản lý nhà cung cấp tour</h1>
        <div class="top-actions">
          <label class="search">
            <input type="search" placeholder="Tìm kiếm..." aria-label="Tìm kiếm" />
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.333 12.667a5.333 5.333 0 1 0 0-10.667 5.333 5.333 0 0 0 0 10.667Z" stroke="#99A1AF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
              <path d="m14 14-2.867-2.867" stroke="#99A1AF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </label>
          <button class="bell" type="button" aria-label="Thông báo">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8.556 17.5c.146.254.356.464.61.61.253.147.54.223.833.223.293 0 .58-.076.834-.223.253-.146.464-.356.61-.61" stroke="#4A5565" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M2.718 12.772a.96.96 0 0 0-.147.897c.066.148.172.274.308.362.135.088.294.135.455.136h13.333c.161 0 .319-.047.455-.135a.965.965 0 0 0 .308-.362.96.96 0 0 0-.147-.898C16.175 11.63 15 10.416 15 6.667c0-1.326-.527-2.598-1.465-3.535C12.598 2.194 11.326 1.667 10 1.667s-2.598.527-3.535 1.465C5.527 4.069 5 5.341 5 6.667c0 3.75-1.176 4.964-2.282 6.105Z" stroke="#4A5565" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <span class="dot"></span>
          </button>
          <div class="user">
            <div class="avatar user-avatar">AD</div>
            <div class="user-info">
              <div class="name">Admin User</div>
              <div class="email">admin@traveltour.vn</div>
            </div>
          </div>
        </div>
      </header>

      <div class="header-row">
        <div class="header-sub">Theo dõi nhà cung cấp và các tour đang mở bán</div>
        <div class="actions">
          <button class="btn" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6.667 13.333c0 .124.034.246.099.351.065.106.158.191.27.246l1.333.667a.667.667 0 0 0 .951-.6V9.333c0-.33.123-.649.345-.894l4.815-5.326a.417.417 0 0 0-.045-.596.416.416 0 0 0-.271-.1H2c-.17 0-.334.068-.455.19a.417.417 0 0 0-.09.458L7.27 8.439c.222.245.345.564.345.894v3.999Z" stroke="#0A0A0A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Lọc
          </button>
          <button class="btn primary" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 10v2.667c0 .353-.14.692-.39.942a1.333 1.333 0 0 1-.943.391H3.333a1.333 1.333 0 0 1-.942-.39 1.333 1.333 0 0 1-.391-.943V10" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="m4.667 6.667 3.333 3.333 3.333-3.333" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 10V2" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Xuất Excel
          </button>
        </div>
      </div>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="panel card">
        <div class="table-wrap">
          <table class="table" id="supplierTable">
            <thead>
              <tr>
                <th>Tên công ty</th>
                <th>Email</th>
                <th>Số tour đang hoạt động</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="table-footer">
          <div id="pagingText">Hi?n th? 1-7 trong 87 nh� cung c?p</div>
          <div class="pagination" id="pagination"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="../../assets/admin/js/quanlinhacungcaptour-data.js"></script>
  <script>
    (function () {
      const data = window.quanLyNhaCungCapTourData || {};

      const navIcons = {
        grid: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 2.5H3.333A.833.833 0 0 0 2.5 3.333v5.834c0 .46.373.833.833.833H7.5c.46 0 .833-.373.833-.833V3.333A.833.833 0 0 0 7.5 2.5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M16.667 2.5H12.5a.833.833 0 0 0-.833.833v2.5c0 .46.373.834.833.834h4.167c.46 0 .833-.373.833-.834v-2.5a.833.833 0 0 0-.833-.833Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M16.667 10h-4.167a.833.833 0 0 0-.833.833v5.834c0 .46.373.833.833.833h4.167c.46 0 .833-.373.833-.833v-5.834A.833.833 0 0 0 16.667 10Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M7.5 13.333H3.333A.833.833 0 0 0 2.5 14.167v2.5c0 .46.373.833.833.833H7.5c.46 0 .833-.373.833-.833v-2.5a.833.833 0 0 0-.833-.834Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        user: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 9.167A3.333 3.333 0 1 0 7.5 2.5a3.333 3.333 0 0 0 0 6.667Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.333 17.5V15.833c0-.884-.351-1.732-.976-2.357a3.333 3.333 0 0 0-2.357-.976H5a3.333 3.333 0 0 0-2.357.976A3.333 3.333 0 0 0 1.667 15.833V17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        building: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 18.333V3.333a1.667 1.667 0 0 1 1.667-1.667h6.666A1.667 1.667 0 0 1 15 3.333v15H5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10H3.333c-.92 0-1.666.747-1.666 1.667v5c0 .92.746 1.666 1.666 1.666H5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 7.5h1.667c.92 0 1.666.747 1.666 1.667v7.5c0 .92-.746 1.666-1.666 1.666H15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        compass: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9.604 1.913a.417.417 0 0 1 .792 0l1.925 3.899a1.667 1.667 0 0 0 1.333.91l4.305.63a.417.417 0 0 1 .233.71l-3.113 3.032a1.667 1.667 0 0 0-.447 1.412l.735 4.283a.417.417 0 0 1-.604.438l-3.848-2.023a1.666 1.666 0 0 0-1.49 0l-3.847 2.023a.417.417 0 0 1-.604-.438l.734-4.283a1.667 1.667 0 0 1-.447-1.412L1.8 8.163a.417.417 0 0 1 .234-.71l4.304-.63a1.667 1.667 0 0 0 1.333-.91l1.934-3.9Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        map: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16.667 8.333c0 4.16-4.616 8.494-6.167 9.833a.833.833 0 0 1-1.166 0C7.783 16.827 3.167 12.494 3.167 8.333c0-1.768.702-3.463 1.952-4.714A6.667 6.667 0 0 1 10 1.667c1.768 0 3.464.702 4.714 1.952a6.666 6.666 0 0 1 1.953 4.714Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 10.833a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        calendar: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.667 1.667V5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.333 1.667V5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.833 3.333H4.167A1.667 1.667 0 0 0 2.5 5v11.667A1.667 1.667 0 0 0 4.167 18.333h11.666A1.667 1.667 0 0 0 17.5 16.667V5A1.667 1.667 0 0 0 15.833 3.333Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 8.333h15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        star: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9.604 1.913a.417.417 0 0 1 .792 0l1.925 3.899a1.667 1.667 0 0 0 1.333.91l4.305.63a.417.417 0 0 1 .233.71l-3.113 3.032a1.667 1.667 0 0 0-.447 1.412l.735 4.283a.417.417 0 0 1-.604.438l-3.848-2.023a1.666 1.666 0 0 0-1.49 0l-3.847 2.023a.417.417 0 0 1-.604-.438l.734-4.283a1.667 1.667 0 0 1-.447-1.412L1.8 8.163a.417.417 0 0 1 .234-.71l4.304-.63a1.667 1.667 0 0 0 1.333-.91l1.934-3.9Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        chart: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.5 2.5v13.333c0 .442.176.866.489 1.178.313.313.737.489 1.178.489H17.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 14.167V7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.833 14.167V4.167" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.667 14.167V11.667" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        settings: '<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.183 1.667H9.817a1.667 1.667 0 0 0-1.667 1.667v.15a1.667 1.667 0 0 1-.833 1.442l-.358.209a1.666 1.666 0 0 1-1.7 0l-.125-.067a1.667 1.667 0 0 0-1.786.143 1.667 1.667 0 0 0-.417 2.108l.184.316a1.667 1.667 0 0 1-.3 1.974l-.125.125a1.667 1.667 0 0 0-.417 2.108 1.667 1.667 0 0 0 1.786.143l.125-.067a1.666 1.666 0 0 1 1.7 0l.358.209a1.667 1.667 0 0 1 .833 1.442v.15a1.667 1.667 0 0 0 1.667 1.667h.366a1.667 1.667 0 0 0 1.667-1.667v-.15a1.667 1.667 0 0 1 .833-1.442l.358-.209a1.666 1.666 0 0 1 1.7 0l.125.067a1.667 1.667 0 0 0 1.786-.143 1.667 1.667 0 0 0 .417-2.108l-.184-.316a1.667 1.667 0 0 1 .3-1.974l.125-.125a1.667 1.667 0 0 0 .417-2.108 1.667 1.667 0 0 0-1.786-.143l-.125.067a1.666 1.666 0 0 1-1.7 0l-.358-.209a1.667 1.667 0 0 1-.833-1.442v-.15a1.667 1.667 0 0 0-1.667-1.667Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      };

      const companyIcon = '<svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 18.333V3.333a1.667 1.667 0 0 1 1.667-1.667h6.666A1.667 1.667 0 0 1 15 3.333v15H5Z" stroke="#00A63E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10H3.333c-.92 0-1.666.747-1.666 1.667v5c0 .92.746 1.666 1.666 1.666H5" stroke="#00A63E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 7.5h1.667c.92 0 1.666.747 1.666 1.667v7.5c0 .92-.746 1.666-1.666 1.666H15" stroke="#00A63E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      const renderSidebar = () => {
        const sidebarNav = document.getElementById('sidebarNav');
        if (!sidebarNav) return;

        const navItems = Array.isArray(data.nav) ? data.nav : [];
        const iconKeys = ['grid','user','building','compass','map','calendar','star','chart','settings'];

        sidebarNav.innerHTML = navItems.map((item, index) => {
          const iconKey = iconKeys[index] || 'grid';
          return `<a class="nav-item" data-index="${index}" href="${item.href || '#'}">
            <span class="nav-icon">${navIcons[iconKey] || navIcons.grid}</span>
            <span>${item.label || ''}</span>
          </a>`;
        }).join('');

        const current = window.location.pathname.split('/').pop();
        sidebarNav.querySelectorAll('.nav-item').forEach((link) => {
          const hrefFile = (link.getAttribute('href') || '').split('/').pop();
          link.classList.toggle('active', hrefFile === current);
        });
      };

      const renderUser = () => {
        const user = data.user || {};
        const avatarEl = document.querySelector('.user-avatar');
        const nameEl = document.querySelector('.user-info .name');
        const emailEl = document.querySelector('.user-info .email');
        if (avatarEl && user.initials) avatarEl.textContent = user.initials;
        if (nameEl && user.name) nameEl.textContent = user.name;
        if (emailEl && user.email) emailEl.textContent = user.email;
      };

      const renderStats = () => {
        const statsGrid = document.getElementById('statsGrid');
        if (!statsGrid || !Array.isArray(data.stats)) return;

        statsGrid.innerHTML = data.stats.map((item) => `<div class="stat-card card tone-${item.tone || 'neutral'}">
          <div class="label">${item.label || ''}</div>
          <div class="value">${item.value || ''}</div>
          ${item.note ? `<div class="note">${item.note}</div>` : ''}
        </div>`).join('');
      };

      const renderSuppliers = () => {
        const tbody = document.querySelector('#supplierTable tbody');
        if (!tbody || !Array.isArray(data.suppliers)) return;

        tbody.innerHTML = data.suppliers.map((supplier) => {
          const statusClass = ['badge', 'status-pill', 'status', supplier.statusKey || ''].filter(Boolean).join(' ');
          const lockButton = `<button class="icon-btn lock-btn" type="button" aria-label="Khóa nhà cung cấp">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12.667 7.333H3.333C2.597 7.333 2 7.93 2 8.667v4.666C2 14.07 2.597 14.667 3.333 14.667h9.334C13.403 14.667 14 14.07 14 13.333V8.667c0-.737-.597-1.334-1.333-1.334Z" stroke="#4A5565" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4.667 7.333V4.667c0-.884.351-1.732.976-2.357A3.333 3.333 0 0 1 8 1.333c.884 0 1.732.351 2.357.977.625.625.976 1.473.976 2.357v2.666" stroke="#4A5565" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>`;

          const actions = supplier.statusKey === 'pending'
            ? `<button class="btn btn-approve" type="button">Phê duyệt</button>${lockButton}`
            : lockButton;

          return `<tr>
            <td>
              <div class="company-cell">
                <div class="company-icon">${companyIcon}</div>
                <div class="company-meta">
                  <div class="company-name">${supplier.name || ''}</div>
                  <div class="small-text">${supplier.email || ''}</div>
                </div>
              </div>
            </td>
            <td>${supplier.email || ''}</td>
            <td>${supplier.tours || 0} tour</td>
            <td><span class="${statusClass}">${supplier.status || ''}</span></td>
            <td>
              <div class="actions-table">
                ${actions}
              </div>
            </td>
          </tr>`;
        }).join('');
      };

      const renderPaging = () => {
        const pagingTextEl = document.getElementById('pagingText');
        if (pagingTextEl && data.paging?.text) pagingTextEl.textContent = data.paging.text;

        const paginationEl = document.getElementById('pagination');
        if (!paginationEl || !data.paging?.pages) return;

        const pages = data.paging.pages;
        const buttons = [
          `<button class="page-btn" type="button">Tru?c</button>`,
          ...pages.map((p, idx) => `<button class="page-btn ${idx === 0 ? 'active' : ''}" type="button">${p}</button>`),
          `<button class="page-btn" type="button">Sau</button>`
        ];
        paginationEl.innerHTML = buttons.join('');
      };

      renderSidebar();
      renderUser();
      renderStats();
      renderSuppliers();
      renderPaging();
    })();
  </script>
</body>
</html>
