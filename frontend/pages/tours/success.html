<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt tour thành công</title>
    <link rel="stylesheet" href="../../assets/css/tours/success.css" />
  </head>
  <body>
    <main class="success-page">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>Đặt tour thành công!</h1>
        <p class="success-desc">Cảm ơn bạn đã đặt tour tại TravelTour.</p>

        <div class="success-info">
          <div class="success-row">
            <span>Mã booking:</span>
            <strong id="booking-code">---</strong>
          </div>
          <div class="success-row">
            <span>Người đặt:</span>
            <strong id="customer-name">---</strong>
          </div>
          <div class="success-row">
            <span>Email:</span>
            <strong id="customer-email">---</strong>
          </div>
          <div class="success-row">
            <span>Phương thức thanh toán:</span>
            <strong id="payment-method">---</strong>
          </div>
        </div>

        <div id="office-note" class="office-note" style="display: none">
          Vui lòng đến văn phòng TravelTour để hoàn tất thanh toán.
        </div>

        <div class="success-actions">
          <a href="../../index.html" class="btn btn-home">Về trang chủ</a>
          <a href="./dstour.html" class="btn btn-tour">Xem thêm tour</a>
        </div>
      </div>
    </main>

    <script src="../../assets/js/tours/success.js"></script>
  </body>
</html>
