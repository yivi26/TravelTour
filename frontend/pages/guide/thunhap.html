<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thu nhập</title>
    <link rel="stylesheet" href="../../assets/css/guide/tongquan.css" />
    <link rel="stylesheet" href="../../assets/css/guide/thunhap.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <a href="tongquan.html" class="logo">TravelTour</a>
        </div>

        <div class="topbar-right">
          <div class="user-info">
            <p class="user-name">Nguyễn Văn An</p>
            <p class="user-role">Hướng dẫn viên</p>
          </div>
          <img
            class="user-avatar"
            src="https://images.unsplash.com/photo-1768933294181-82778103e501?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=1080"
            alt="Guide Avatar"
          />
        </div>
      </header>

      <div class="dashboard-body">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <nav class="sidebar-menu">
            <a href="tongquan.html" class="menu-item">
              <span class="menu-icon">📊</span>
              <span>Dashboard</span>
            </a>

            <a href="lichtrinh.html" class="menu-item">
              <span class="menu-icon">🕘</span>
              <span>Lịch trình của tôi</span>
            </a>

            <a href="tourdangdan.html" class="menu-item">
              <span class="menu-icon">📅</span>
              <span>Tour đang dẫn</span>
            </a>

            <a href="khachhang.html" class="menu-item">
              <span class="menu-icon">👥</span>
              <span>Khách hàng</span>
            </a>

            <a href="thunhap.html" class="menu-item active">
              <span class="menu-icon">💰</span>
              <span>Thu nhập</span>
            </a>

            <a href="hoso.html" class="menu-item">
              <span class="menu-icon">👤</span>
              <span>Hồ sơ cá nhân</span>
            </a>

            <button class="menu-item logout-btn" type="button" id="logoutBtn">
              <span class="menu-icon">🚪</span>
              <span>Đăng xuất</span>
            </button>
          </nav>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
          <div class="page-container">
            <div class="page-header">
              <h1>Thu nhập</h1>
              <p>Theo dõi thu nhập và giao dịch của bạn</p>
            </div>

            <!-- Stats -->
            <section class="income-stats-grid" id="incomeStatsGrid"></section>

            <!-- Bar chart -->
            <section class="card income-card">
              <div class="chart-header">
                <h3 class="section-title small-title">
                  Biểu đồ thu nhập theo tháng
                </h3>
                <select id="rangeSelect" class="range-select">
                  <option value="6">6 tháng gần nhất</option>
                  <option value="3">3 tháng gần nhất</option>
                  <option value="12">12 tháng gần nhất</option>
                </select>
              </div>
              <div class="chart-wrap">
                <canvas id="incomeBarChart"></canvas>
              </div>
            </section>

            <!-- Line chart -->
            <section class="card income-card">
              <h3 class="section-title small-title">Xu hướng thu nhập</h3>
              <div class="chart-wrap line-chart-wrap">
                <canvas id="incomeLineChart"></canvas>
              </div>
            </section>

            <!-- Transactions -->
            <section class="card income-card">
              <h3 class="section-title small-title">Giao dịch gần đây</h3>
              <div class="transaction-list" id="transactionList"></div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/guide/thunhap.js"></script>
  </body>
</html>
