<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelTour - Phân công hướng dẫn viên</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <!-- CSS khung giống dashboard -->
    <link rel="stylesheet" href="../../assets/css/provider/dashboard.css" />

    <!-- CSS riêng của phân công hướng dẫn viên -->
    <link
      rel="stylesheet"
      href="../../assets/css/provider/guide_assignment.css"
    />
  </head>
  <body>
    <div class="dashboard">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle">☰</button>
          <a href="./dashboard.html" class="logo">TravelTour</a>
        </div>

        <div class="topbar-right">
          <div class="user-info">
            <p class="user-name">Provider</p>
            <p class="user-role">Nhà cung cấp tour</p>
          </div>
          <div class="user-avatar">
            <i class="fa-regular fa-user"></i>
          </div>
        </div>
      </header>

      <div class="dashboard-body">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
          <nav class="sidebar-menu">
            <a href="./dashboard.html" class="menu-item">
              <span class="menu-icon">
                <i class="fa-solid fa-border-all"></i>
              </span>
              <span>Tổng quan</span>
            </a>

            <a href="./tour_management.html" class="menu-item">
              <span class="menu-icon">
                <i class="fa-solid fa-map"></i>
              </span>
              <span>Quản lý tour</span>
            </a>

            <a href="./booking_management.html" class="menu-item">
              <span class="menu-icon">
                <i class="fa-solid fa-calendar-check"></i>
              </span>
              <span>Quản lý booking</span>
            </a>

            <a href="./guide_assignment.html" class="menu-item active">
              <span class="menu-icon">
                <i class="fa-solid fa-users"></i>
              </span>
              <span>Phân công hướng dẫn viên</span>
            </a>

            <a href="./report.html" class="menu-item">
              <span class="menu-icon">
                <i class="fa-solid fa-chart-line"></i>
              </span>
              <span>Báo cáo doanh thu</span>
            </a>

            <a href="./profile.html" class="menu-item">
              <span class="menu-icon">
                <i class="fa-solid fa-building"></i>
              </span>
              <span>Hồ sơ nhà cung cấp</span>
            </a>

            <button class="menu-item logout-btn" type="button">
              <span class="menu-icon">🚪</span>
              <span>Đăng xuất</span>
            </button>
          </nav>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
          <div class="page-container guide-page">
            <section class="guide-page-header">
              <h1>Phân công hướng dẫn viên</h1>
              <p>Quản lý và phân công HDV cho các tour</p>
            </section>

            <div class="guide-content-grid">
              <!-- Guide list -->
              <section class="guide-col-card">
                <div class="guide-col-title">
                  <i class="fa-regular fa-user"></i>
                  <span>Danh sách HDV</span>
                </div>

                <div id="guideList" class="guide-list"></div>
              </section>

              <!-- Upcoming tours -->
              <section class="guide-col-card">
                <div class="guide-col-title">
                  <i class="fa-regular fa-calendar-check"></i>
                  <span>Tour sắp khởi hành</span>
                </div>

                <div id="tourList" class="tour-list"></div>
              </section>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../../assets/js/provider/guide_assignment.js"></script>
  </body>
</html>
